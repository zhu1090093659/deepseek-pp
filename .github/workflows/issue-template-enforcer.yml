name: Enforce Issue Template

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write

jobs:
  enforce:
    name: Close issues that skip the template
    runs-on: ubuntu-latest

    steps:
      - name: Validate issue template
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (issue.pull_request) {
              return;
            }

            const baseRequiredSections = [
              'Issue type',
              'Summary',
              'Expected outcome',
              'Details / reproduction',
              'Environment',
            ];

            const body = issue.body || '';
            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const readSection = (label) => {
              const heading = escapeRegExp(label);
              const pattern = new RegExp(`(?:^|\\n)###\\s+${heading}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i');
              const match = body.match(pattern);
              return match ? match[1].replace(/<!--[\s\S]*?-->/g, '').trim() : '';
            };

            const isBlank = (value) => {
              const normalized = value.replace(/\s+/g, ' ').trim().toLowerCase();
              return normalized === '' || normalized === 'no response' || normalized === '_no response_';
            };

            const hasScreenshotEvidence = (value) => {
              return /!\[[^\]]*]\([^)]+\)/i.test(value)
                || /https?:\/\/\S*(?:github\.com\/user-attachments\/assets\/|github\.com\/[^)\s]+\/assets\/|githubusercontent\.com\/|[./][^)\s]+\.(?:png|jpe?g|gif|webp))(?:[?#]\S*)?/i.test(value);
            };

            const issueType = readSection('Issue type').trim().toLowerCase();
            const bugScreenshot = readSection('Bug screenshot');
            const requiredSections = issueType === 'bug report'
              ? [...baseRequiredSections, 'Bug screenshot']
              : baseRequiredSections;

            const missingSections = requiredSections.filter((label) => isBlank(readSection(label)));
            const invalidSections = [];
            if (issueType === 'bug report' && !isBlank(bugScreenshot) && !hasScreenshotEvidence(bugScreenshot)) {
              invalidSections.push('Bug screenshot must include an uploaded image, Markdown image, or image URL.');
            }
            const missingSectionMessages = missingSections.length > 0
              ? [`Missing or empty section(s): ${missingSections.join(', ')}`]
              : [];

            if (missingSections.length === 0 && invalidSections.length === 0) {
              return;
            }

            const comment = [
              'This issue was automatically closed because it does not use the required issue template.',
              '',
              'Please open a new issue from the repository issue form and fill every required section:',
              '',
              ...requiredSections.map((label) => `- ${label}`),
              '',
              ...missingSectionMessages,
              ...invalidSections,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
