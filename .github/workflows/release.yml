name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.2.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build zip packages
        run: npm run zip:all

      - name: Locate packages
        id: package
        shell: bash
        run: |
          mapfile -t ZIP_FILES < <(find dist -maxdepth 1 -type f -name '*.zip' | sort)
          if [ "${#ZIP_FILES[@]}" -eq 0 ]; then
            echo "No zip packages found in dist/" >&2
            exit 1
          fi

          {
            echo "zip_files<<EOF"
            printf '%s\n' "${ZIP_FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ZIP_FILES: ${{ steps.package.outputs.zip_files }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          VERSION="${TAG#v}"
          TITLE="DeepSeek++ ${VERSION}"
          NOTES_FILE="docs/releases/${VERSION}.md"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          mapfile -t RELEASE_FILES <<< "$ZIP_FILES"

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "package.json version $PACKAGE_VERSION does not match release tag $TAG" >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${RELEASE_FILES[@]}" --clobber
          else
            create_args=("$TAG" "${RELEASE_FILES[@]}" --title "$TITLE")
            if [ -f "$NOTES_FILE" ]; then
              create_args+=(--notes-file "$NOTES_FILE")
            else
              create_args+=(--generate-notes)
            fi
            if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              create_args+=(--target "$GITHUB_SHA")
            fi
            gh release create "${create_args[@]}"
          fi
