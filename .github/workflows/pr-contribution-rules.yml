name: Enforce PR Contribution Rules

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  enforce:
    name: Validate PR contribution evidence
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Validate pull request body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const readSection = (label) => {
              const heading = escapeRegExp(label);
              const pattern = new RegExp(`(?:^|\\n)##\\s+${heading}\\s*\\n+([\\s\\S]*?)(?=\\n##\\s+|$)`, 'i');
              const match = body.match(pattern);
              return match ? match[1].replace(/<!--[\s\S]*?-->/g, '').trim() : '';
            };

            const isBlank = (value) => {
              const normalized = value.replace(/\s+/g, ' ').trim().toLowerCase();
              return normalized === '' || normalized === 'no response' || normalized === '_no response_';
            };

            const hasCheckedLine = (value, label) => {
              const pattern = new RegExp(`^-\\s*\\[[xX]\\]\\s*${escapeRegExp(label)}\\s*$`, 'm');
              return pattern.test(value);
            };

            const hasAnyCheckedBox = (value) => /^-\s*\[[xX]\]\s+\S+/m.test(value);
            const cleanValidationText = (value) => value
              .replace(/```[a-zA-Z0-9_-]*\s*/g, '')
              .replace(/```/g, '')
              .trim();
            const readValidationPart = (value, label, nextLabel = null) => {
              const start = escapeRegExp(label);
              const end = nextLabel ? `\\n\\s*${escapeRegExp(nextLabel)}\\s*:` : '$';
              const pattern = new RegExp(`${start}\\s*:\\s*([\\s\\S]*?)(?=${end})`, 'i');
              const match = value.match(pattern);
              return match ? cleanValidationText(match[1]) : '';
            };
            const hasEvidence = (value) => {
              return /!\[[^\]]*]\([^)]+\)/i.test(value)
                || /https?:\/\/\S*(?:github\.com\/user-attachments\/assets\/|github\.com\/[^)\s]+\/assets\/|githubusercontent\.com\/|[./][^)\s]+\.(?:png|jpe?g|gif|webp|mp4|mov|webm))(?:[?#]\S*)?/i.test(value);
            };

            const prType = readSection('PR Type');
            const latest = readSection('Latest Codebase Confirmation');
            const validation = readSection('Local Validation');
            const evidence = readSection('Local Feature Evidence');

            const errors = [];
            if (!hasAnyCheckedBox(prType)) {
              errors.push('Check at least one item in `PR Type`.');
            }
            if (!hasCheckedLine(latest, 'I developed this PR from the latest `main` branch or rebased/merged latest `main` before submitting.')) {
              errors.push('Confirm that this PR is based on the latest `main` in `Latest Codebase Confirmation`.');
            }
            const validationCommands = readValidationPart(validation, 'Commands run', 'Result summary');
            const validationSummary = readValidationPart(validation, 'Result summary');
            if (isBlank(validationCommands) || isBlank(validationSummary)) {
              errors.push('Fill `Local Validation` with commands run and a result summary.');
            }

            const userFacing = hasCheckedLine(prType, 'User-facing feature or behavior change');
            if (userFacing && !hasEvidence(evidence)) {
              errors.push('User-facing feature PRs must attach local feature evidence: a screenshot, short recording, Markdown image, or image/video URL.');
            }

            if (errors.length === 0) {
              return;
            }

            const comment = [
              'This pull request is missing required contribution information.',
              '',
              'Please update the PR body and keep the pull request template intact:',
              '',
              ...errors.map((error) => `- ${error}`),
              '',
              'New or changed user-facing functionality must include local screenshots or a short recording showing the extension loaded from the latest code / this PR head and the feature working successfully.',
            ].join('\n');

            if (context.payload.action !== 'synchronize') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: comment,
              });
            }

            core.setFailed(errors.join('\n'));
